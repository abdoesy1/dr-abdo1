<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Payment Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body { font-family: 'Inter', sans-serif; background-color: #030303; color: white; overflow-x: hidden; }
        
        /* Grid BG */
        .bg-grid { background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0); background-size: 40px 40px; }
        
        /* Glassmorphism */
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        /* Animations */
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
        .animate-float { animation: float 6s ease-in-out infinite; }
        
        .typewriter::after { content: '|'; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* Spotlight Effect */
        .spotlight-card { position: relative; overflow: hidden; transition: all 0.3s ease; }
        .spotlight-card::before { content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: radial-gradient(400px circle at var(--x) var(--y), rgba(59, 130, 246, 0.15), transparent 40%); opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        .spotlight-card:hover::before { opacity: 1; }
    </style>
</head>
<body class="min-h-screen">
    
    <div class="fixed inset-0 z-0 bg-grid opacity-30"></div>
    <div class="fixed top-[-10%] left-[-10%] w-[500px] h-[500px] bg-blue-600/20 blur-[150px] rounded-full animate-pulse"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-[600px] h-[600px] bg-purple-600/20 blur-[150px] rounded-full animate-pulse delay-1000"></div>

    <main class="relative z-10 container mx-auto px-6 py-20 max-w-4xl">
        <div class="text-center mb-16">
            <span class="inline-block px-4 py-1.5 rounded-full bg-white/5 border border-white/10 text-xs font-semibold tracking-wider text-blue-400 mb-6 uppercase">Secure Payments</span>
            <h1 class="text-4xl md:text-6xl font-bold mb-6 tracking-tight">
                <span id="typewriter" class="text-transparent bg-clip-text bg-gradient-to-r from-white to-gray-400"></span>
            </h1>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- PayPal -->
            <div class="spotlight-card glass p-8 rounded-3xl animate-float">
                <h3 class="text-xl font-bold mb-4 flex items-center gap-3">PayPal</h3>
                <a href="https://paypal.me/AbdelrahmanSayed252" target="_blank" class="w-full py-3 bg-white text-black font-semibold rounded-xl hover:bg-gray-200 transition-all flex items-center justify-center gap-2">Pay via PayPal</a>
            </div>

            <!-- Wise -->
            <div class="spotlight-card glass p-8 rounded-3xl animate-float delay-100">
                <h3 class="text-xl font-bold mb-4">Wise</h3>
                <div class="grid grid-cols-3 gap-2">
                    <a href="https://wise.com/pay/r/KxhTAlJl7THuBAs" target="_blank" class="py-2 bg-white/5 rounded-lg text-center hover:bg-green-500/20 text-sm">$5</a>
                    <a href="https://wise.com/pay/r/mtJUgCpvc3KtyBk" target="_blank" class="py-2 bg-white/5 rounded-lg text-center hover:bg-green-500/20 text-sm">$10</a>
                    <a href="https://wise.com/pay/r/wwS0FVUrluPvgtk" target="_blank" class="py-2 bg-white/5 rounded-lg text-center hover:bg-green-500/20 text-sm">$20</a>
                </div>
            </div>

            <!-- Crypto Vault -->
            <div class="spotlight-card glass p-8 rounded-3xl md:col-span-2">
                <h3 class="text-xl font-bold mb-6">Crypto Vault</h3>
                <div class="flex gap-2 mb-4">
                    <button onclick="switchCrypto('ltc')" class="px-4 py-2 bg-white/10 rounded-lg hover:bg-white/20 transition-all">LTC</button>
                    <button onclick="switchCrypto('usdt')" class="px-4 py-2 bg-white/10 rounded-lg hover:bg-white/20 transition-all">USDT</button>
                    <button onclick="switchCrypto('btc')" class="px-4 py-2 bg-white/10 rounded-lg hover:bg-white/20 transition-all">BTC</button>
                </div>
                <p id="addr" class="font-mono text-sm break-all bg-black/30 p-4 rounded-xl border border-white/5 mb-4">LQsXy5iuRn2wbky6JGL1NmYkZRLXGkT2Ew</p>
                <button onclick="copyAddr()" class="w-full py-3 bg-blue-600 rounded-xl hover:bg-blue-500 transition-all">Copy Address</button>
            </div>

            <!-- FunPay -->
            <div class="spotlight-card glass p-8 rounded-3xl animate-float delay-200">
                <h3 class="text-xl font-bold mb-4">FunPay</h3>
                <p class="text-gray-400 mb-4 text-sm">Purchase securely through my FunPay profile.</p>
                <a href="https://funpay.com/en/users/20157502/" target="_blank" class="w-full py-3 bg-white/5 text-white font-semibold rounded-xl hover:bg-purple-600 transition-all flex items-center justify-center gap-2">Visit Profile</a>
            </div>
        </div>
    </main>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-white text-black px-6 py-3 rounded-full font-bold hidden animate-bounce z-50">
        Copied Successfully! 🚀
    </div>

    <script>
        // Spotlight Effect
        document.addEventListener('mousemove', e => {
            document.querySelectorAll('.spotlight-card').forEach(card => {
                const rect = card.getBoundingClientRect();
                card.style.setProperty('--x', (e.clientX - rect.left) + 'px');
                card.style.setProperty('--y', (e.clientY - rect.top) + 'px');
            });
        });

        // Typewriter Effect (Looping)
        const text = "Choose Your Preferred Payment Method";
        const el = document.getElementById('typewriter');
        let i = 0, isDeleting = false;
        function type() {
            el.innerText = text.substring(0, i);
            i = isDeleting ? i - 1 : i + 1;
            if (!isDeleting && i === text.length) setTimeout(() => isDeleting = true, 2000);
            else if (isDeleting && i === 0) isDeleting = false;
            setTimeout(type, isDeleting ? 50 : 100);
        }
        type();

        // Crypto Switcher
        const addrs = { ltc: 'LQsXy5iuRn2wbky6JGL1NmYkZRLXGkT2Ew', usdt: 'TWAa6spHGSDJdrk8CTNfcGjKAd9CakDFhK', btc: 'bc1qf60mv4p5g2x424e9tcjz46sdez9sednvdpgt4p' };
        function switchCrypto(c) { document.getElementById('addr').innerText = addrs[c]; }
        
        // Copy Function
        function copyAddr() {
            const addr = document.getElementById('addr').innerText;
            navigator.clipboard.writeText(addr).then(() => {
                const toast = document.getElementById('toast');
                toast.classList.remove('hidden');
                setTimeout(() => toast.classList.add('hidden'), 3000);
            }).catch(err => {
                // Fallback
                const textArea = document.createElement("textarea");
                textArea.value = addr;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                const toast = document.getElementById('toast');
                toast.classList.remove('hidden');
                setTimeout(() => toast.classList.add('hidden'), 3000);
            });
        }
    </script>
</body>
</html>
