<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Payment Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        body { font-family: 'Inter', sans-serif; background-color: #030303; color: white; overflow-x: hidden; }
        
        /* Premium Background Glow */
        .glow-bg { background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #030303 70%); }
        
        /* Card Tilt Effect */
        .tilt-card { transition: transform 0.1s ease-out, box-shadow 0.3s ease; perspective: 1000px; }
        .tilt-card:hover { transform: translateY(-10px) rotateX(2deg) rotateY(2deg); }
        
        /* Text Gradient Animation */
        .text-gradient { background: linear-gradient(90deg, #60a5fa, #a855f7, #60a5fa); background-size: 200%; animation: gradient 5s linear infinite; }
        @keyframes gradient { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }
        
        /* Breathing Animation */
        .breathing { animation: breathe 6s ease-in-out infinite; }
        @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.01); } }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        
        /* Card Glass */
        .card-glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="min-h-screen glow-bg">

    <main class="container mx-auto px-6 py-20 max-w-4xl">
        <div class="text-center mb-16">
            <h1 class="text-2xl sm:text-4xl md:text-6xl font-bold mb-6 tracking-tight whitespace-nowrap overflow-hidden">
                <span id="typewriter" class="text-transparent bg-clip-text text-gradient"></span>
                <span class="animate-pulse">|</span>
            </h1>
            <p class="text-gray-400 text-lg">Secure, Fast, and Easy Payments.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 breathing">
            
            <!-- PayPal -->
            <div class="card-glass p-8 rounded-3xl tilt-card group">
                <h3 class="text-xl font-bold mb-4">PayPal</h3>
                <a href="https://paypal.me/AbdelrahmanSayed252" target="_blank" class="block w-full py-4 text-center bg-blue-600 text-white font-semibold rounded-xl hover:bg-blue-500 transition-all active:scale-95">Open PayPal</a>
            </div>

            <!-- Wise -->
            <div class="card-glass p-8 rounded-3xl tilt-card group">
                <h3 class="text-xl font-bold mb-4">Wise</h3>
                <div class="grid grid-cols-3 gap-2">
                    <a href="https://wise.com/pay/r/KxhTAlJl7THuBAs" target="_blank" class="py-3 bg-white/5 rounded-lg text-center hover:bg-green-600 transition-all font-bold active:scale-95">$5</a>
                    <a href="https://wise.com/pay/r/mtJUgCpvc3KtyBk" target="_blank" class="py-3 bg-white/5 rounded-lg text-center hover:bg-green-600 transition-all font-bold active:scale-95">$10</a>
                    <a href="https://wise.com/pay/r/wwS0FVUrluPvgtk" target="_blank" class="py-3 bg-white/5 rounded-lg text-center hover:bg-green-600 transition-all font-bold active:scale-95">$20</a>
                </div>
            </div>

            <!-- Crypto Vault -->
            <div class="card-glass p-8 rounded-3xl md:col-span-2 tilt-card group">
                <h3 class="text-xl font-bold mb-6">Crypto Vault</h3>
                <div class="flex gap-2 mb-4">
                    <button onclick="switchCrypto('ltc')" class="crypto-btn px-6 py-2 bg-white/10 rounded-full hover:bg-blue-600 transition-all">LTC</button>
                    <button onclick="switchCrypto('usdt')" class="crypto-btn px-6 py-2 bg-white/10 rounded-full hover:bg-green-600 transition-all">USDT</button>
                    <button onclick="switchCrypto('btc')" class="crypto-btn px-6 py-2 bg-white/10 rounded-full hover:bg-orange-600 transition-all">BTC</button>
                </div>
                <p id="addr" class="font-mono text-sm break-all bg-black/50 p-4 rounded-xl border border-white/5 mb-4 text-blue-300">LQsXy5iuRn2wbky6JGL1NmYkZRLXGkT2Ew</p>
                <button onclick="copyAddr()" class="w-full py-4 bg-white/5 hover:bg-white/10 rounded-xl font-bold transition-all active:scale-95">Copy Address</button>
            </div>

            <!-- FunPay -->
            <div class="card-glass p-8 rounded-3xl tilt-card group md:col-span-2">
                <h3 class="text-xl font-bold mb-4">FunPay</h3>
                <a href="https://funpay.com/en/users/20157502/" target="_blank" class="block w-full py-4 text-center bg-purple-600 text-white font-semibold rounded-xl hover:bg-purple-500 transition-all active:scale-95">Visit Profile</a>
            </div>
        </div>
    </main>

    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-white text-black px-8 py-4 rounded-full font-bold hidden shadow-2xl z-50 animate-bounce">
        Copied Successfully!
    </div>

    <script>
        // Typewriter Logic (Looping)
        const text = "Choose Your Preferred Payment Method";
        const el = document.getElementById('typewriter');
        let i = 0, isDeleting = false;
        function type() {
            el.innerText = text.substring(0, i);
            if (!isDeleting && i < text.length) i++;
            else if (isDeleting && i > 0) i--;
            else isDeleting = !isDeleting;
            setTimeout(type, isDeleting ? 30 : 80);
        }
        type();

        // Crypto
        const addrs = { ltc: 'LQsXy5iuRn2wbky6JGL1NmYkZRLXGkT2Ew', usdt: 'TWAa6spHGSDJdrk8CTNfcGjKAd9CakDFhK', btc: 'bc1qf60mv4p5g2x424e9tcjz46sdez9sednvdpgt4p' };
        function switchCrypto(c) { document.getElementById('addr').innerText = addrs[c]; }
        
        // Robust Copy
        function copyAddr() {
            const addr = document.getElementById('addr').innerText;
            const t = document.getElementById('toast');
            
            // Fallback copy
            const ta = document.createElement("textarea");
            ta.value = addr;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            
            t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 2000);
        }
    </script>
</body>
</html>
